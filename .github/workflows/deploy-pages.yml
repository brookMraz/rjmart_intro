# GitHub Pages 若从分支直接发布，站点上仍是 Git 里的 LFS「指针文件」而非真实 mp4，
# 视频会黑屏、时长 0:00。本工作流在 checkout 时拉取 LFS 对象，再把静态资源上传到 Pages。
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with Git LFS)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Assemble static site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -R scripts styles asset _site/
          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
